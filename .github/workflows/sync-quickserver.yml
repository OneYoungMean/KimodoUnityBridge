name: sync-quickserver

on:
  workflow_dispatch:
    inputs:
      quickserver_ref:
        description: Ref/branch/tag of OneYoungMean/NvlabKimodoQuickServer
        required: false
        default: main
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-quickserver
  cancel-in-progress: false

jobs:
  sync:
    runs-on: windows-latest

    steps:
      - name: Checkout KimodoUnityBridge
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve QuickServer ref
        id: quickserver_ref
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.quickserver_ref }}"
          if ([string]::IsNullOrWhiteSpace($ref)) {
            $ref = "main"
          }
          "value=$ref" >> $env:GITHUB_OUTPUT

      - name: Checkout NvlabKimodoQuickServer
        uses: actions/checkout@v4
        with:
          repository: OneYoungMean/NvlabKimodoQuickServer
          ref: ${{ steps.quickserver_ref.outputs.value }}
          path: __quickserver_source

      - name: Mirror into embedded runtime folder
        shell: pwsh
        run: |
          $source = Join-Path $env:GITHUB_WORKSPACE "__quickserver_source"
          $target = Join-Path $env:GITHUB_WORKSPACE "NvlabKimodoQuickServer~"

          New-Item -ItemType Directory -Force -Path $target | Out-Null
          robocopy $source $target /MIR /XD .git .github | Out-Null
          if ($LASTEXITCODE -ge 8) {
            throw "robocopy failed with exit code $LASTEXITCODE"
          }

      - name: Commit synced runtime
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add NvlabKimodoQuickServer~

          if (git diff --cached --quiet) {
            "changed=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $ref = "${{ steps.quickserver_ref.outputs.value }}"
          git commit -m "chore: sync quickserver from $ref"
          git push origin HEAD:${{ github.ref_name }}

      - name: Summary
        shell: pwsh
        run: |
          @(
            "Synced QuickServer ref: ${{ steps.quickserver_ref.outputs.value }}"
            "Triggered by: ${{ github.event_name }}"
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
